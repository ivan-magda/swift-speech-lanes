name: Swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v7

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test -v

      # Runs on the macOS runner so SwiftLint is a current build that parses Swift 6.2
      # (typed throws, .v26 platforms); the standalone Linux action lags the language.
      - name: SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint --strict
